#android.useAndroidX=true
#android.enableJetifier=true
# Aumentamos la RAM para Gradle (16GB a 24GB es el punto dulce para 64GB totales)
org.gradle.jvmargs=-Xmx24G -XX:MaxMetaspaceSize=2G -XX:ReservedCodeCacheSize=1G -XX:+UseG1GC -XX:+HeapDumpOnOutOfMemoryError

# Forzar el uso de todos los núcleos disponibles
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.configureondemand=true

# Optimización de Android
android.useAndroidX=true
android.enableJetifier=false